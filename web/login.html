<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BSFChat ID</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">
                <h1>BSFChat ID</h1>
                <p class="subtitle">Sign in to your account</p>
            </div>

            <div id="error-msg" class="error hidden"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required autocomplete="username" autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary">Sign In</button>
            </form>

            <div class="card-footer">
                <p>Don't have an account? <a href="/register.html">Create one</a></p>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const data = await apiPost('/api/login', { username, password });

                // Check if we have OIDC redirect params
                const params = new URLSearchParams(window.location.search);
                const redirect = params.get('redirect');
                if (redirect) {
                    // Re-trigger the authorize flow now that we have a session
                    const authorizeUrl = '/authorize?' + new URLSearchParams({
                        client_id: params.get('client_id') || '',
                        redirect_uri: redirect,
                        response_type: params.get('response_type') || 'code',
                        scope: params.get('scope') || 'openid',
                        state: params.get('state') || '',
                        code_challenge: params.get('code_challenge') || '',
                        code_challenge_method: params.get('code_challenge_method') || ''
                    }).toString();
                    window.location.href = authorizeUrl;
                } else {
                    window.location.href = '/profile.html';
                }
            } catch (err) {
                showError(err.message);
            }
        });
    </script>
</body>
</html>
