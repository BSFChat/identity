<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - BSFChat ID</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">BSFChat ID</div>
        <div class="nav-links">
            <a href="/profile.html">Profile</a>
            <a href="/admin.html" class="active">Admin</a>
            <a href="#" id="logout-btn">Sign Out</a>
        </div>
    </nav>

    <div class="container">
        <div class="card wide">
            <h2>User Management</h2>
            <div id="error-msg" class="error hidden"></div>

            <table class="data-table" id="users-table">
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Display Name</th>
                        <th>Admin</th>
                        <th>Created</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="users-body">
                </tbody>
            </table>
        </div>

        <div class="card wide">
            <h2>OAuth Clients</h2>

            <table class="data-table" id="clients-table">
                <thead>
                    <tr>
                        <th>Client ID</th>
                        <th>Name</th>
                        <th>Redirect URIs</th>
                        <th>Created</th>
                    </tr>
                </thead>
                <tbody id="clients-body">
                </tbody>
            </table>

            <h3>Register New Client</h3>
            <form id="client-form">
                <div class="form-group">
                    <label for="client-name">Client Name</label>
                    <input type="text" id="client-name" required>
                </div>
                <div class="form-group">
                    <label for="client-uris">Redirect URIs (JSON array)</label>
                    <input type="text" id="client-uris" required placeholder='["http://localhost:8448/callback"]'>
                </div>
                <button type="submit" class="btn btn-primary">Register Client</button>
            </form>
            <div id="client-result" class="hidden">
                <h4>Client Created</h4>
                <pre id="client-result-json"></pre>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        async function loadUsers() {
            try {
                const data = await apiGet('/api/admin/users');
                const tbody = document.getElementById('users-body');
                tbody.innerHTML = '';
                for (const user of data.users) {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${escapeHtml(user.username)}</td>
                        <td>${escapeHtml(user.email || '')}</td>
                        <td>${escapeHtml(user.display_name || '')}</td>
                        <td>${user.is_admin ? 'Yes' : 'No'}</td>
                        <td>${new Date(user.created_at * 1000).toLocaleDateString()}</td>
                        <td><button class="btn btn-small btn-danger" onclick="disableUser('${user.id}')">Disable</button></td>
                    `;
                    tbody.appendChild(tr);
                }
            } catch (err) {
                if (err.message.includes('403') || err.message.includes('401')) {
                    window.location.href = '/login.html';
                }
                showError(err.message);
            }
        }

        async function loadClients() {
            try {
                const data = await apiGet('/api/admin/clients');
                const tbody = document.getElementById('clients-body');
                tbody.innerHTML = '';
                for (const client of data.clients) {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><code>${escapeHtml(client.client_id)}</code></td>
                        <td>${escapeHtml(client.name)}</td>
                        <td>${escapeHtml(client.redirect_uris)}</td>
                        <td>${new Date(client.created_at * 1000).toLocaleDateString()}</td>
                    `;
                    tbody.appendChild(tr);
                }
            } catch (err) {
                showError(err.message);
            }
        }

        async function disableUser(userId) {
            if (!confirm('Are you sure you want to disable this user?')) return;
            try {
                await apiPost(`/api/admin/users/${userId}/disable`, {});
                loadUsers();
            } catch (err) {
                showError(err.message);
            }
        }

        document.getElementById('client-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                const result = await apiPost('/api/admin/clients', {
                    name: document.getElementById('client-name').value,
                    redirect_uris: document.getElementById('client-uris').value
                });
                document.getElementById('client-result').classList.remove('hidden');
                document.getElementById('client-result-json').textContent = JSON.stringify(result, null, 2);
                loadClients();
            } catch (err) {
                showError(err.message);
            }
        });

        document.getElementById('logout-btn').addEventListener('click', async (e) => {
            e.preventDefault();
            try { await apiPost('/api/logout', {}); } catch (err) { /* ignore */ }
            window.location.href = '/login.html';
        });

        loadUsers();
        loadClients();
    </script>
</body>
</html>
